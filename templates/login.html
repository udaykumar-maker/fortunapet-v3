<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — PI Tracker</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f6f9;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .box{background:#fff;border:1px solid #e2e6ec;border-radius:12px;padding:32px;width:340px}
  .box h1{font-size:18px;margin:0 0 4px;text-align:center}
  .box p.sub{font-size:12.5px;color:#6b7280;text-align:center;margin:0 0 22px}
  label{font-size:12px;color:#6b7280;font-weight:500;display:block;margin-bottom:5px}
  input{border:1px solid #d1d5db;border-radius:7px;padding:9px 11px;font-size:13.5px;width:100%;box-sizing:border-box;margin-bottom:14px}
  input:focus{outline:none;border-color:#2563eb}
  button{width:100%;padding:10px;border-radius:7px;border:none;background:#2563eb;color:#fff;font-size:13.5px;font-weight:600;cursor:pointer}
  button:hover{background:#1d4ed8}
  .flash{padding:9px 12px;border-radius:7px;font-size:12.5px;margin-bottom:14px;background:#fee2e2;color:#dc2626}
</style>
</head>
<body>
  <div class="box">
    <h1>📄 PI Tracker</h1>
    <p class="sub">Log in to your team workspace</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
      <label>Password</label>
      <input type="password" name="password" required>
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
